        <p>Одна из первых карт, где автор нашёл секретку сам. Однажды забежал в маленький сарайчик рядом с домом на острове — и там лежал ключ! Ключ открывает стену в доме.</p>

function showMap(mapId) {
    const map = maps[mapId];
    if (!map) return;
    const html = `
        <div>
            <div class="map-name">🗺️ ${map.name}</div>
            <img class="map-img" src="${map.img}" alt="${map.name}" onerror="this.src='https://placehold.co/1200x700/1a1a1a/FFD700?text=IMAGE+NOT+LOADED'">
            <div class="keys-info">${map.text}</div>
        </div>
    `;
    document.getElementById('infoArea').innerHTML = html;
}

function showSettings() {
    document.getElementById('infoArea').innerHTML = `
        <div style="color:white;">
            <h2 style="color:#FFD700;">🎮 ЛУЧШИЕ НАСТРОЙКИ PUBG 2026</h2>
            <p><strong>Мышь:</strong> DPI 400-800, отключить ускорение, чувствительность x1=35-45, x4=20-30.<br>
            <strong>Графика:</strong> Полноэкранный, текстуры Ultra, тени Very Low, растительность Very Low.<br>
            <strong>Звук:</strong> HRTF включить, музыка 0%, звук других 100%.<br>
            <strong>Параметры запуска Steam:</strong> <code>-malloc=system -USEALLAVAILABLECORES -sm4</code></p>
            <div style="background:#1a1a1a; padding:15px; border-left:5px solid #FFD700; margin-top:20px; border-radius:12px;">
                ✅ Чек-лист: DPI, отключить ускорение, текстуры Ultra, HRTF, параметры запуска.
            </div>
        </div>
    `;
}

function showNews() {
    document.getElementById('infoArea').innerHTML = `
        <div class="news-contacts">
            <h2 style="color:#FFD700;">📢 НОВОСТИ И КОНТАКТЫ</h2>
            <div class="news-card">
                <h3>📱 Telegram-канал</h3>
                <p>Подписывайтесь на официальный канал с новостями PUBG, секретками и обновлениями:</p>
                <a href="https://t.me/RoomPubg26" target="_blank" class="contact-link">👉 @RoomPubg26</a>
                <p style="margin-top: 10px;">Там публикуются свежие гайды, новости о ключах и секретные места.</p>
            </div>
            <div class="news-card">
                <h3>📧 Связь с разработчиком</h3>
                <p>Если вы нашли ошибку, хотите предложить идею или просто написать:</p>
                <a href="mailto:ryabda1904@gmail.com" class="contact-link">ryabda1904@gmail.com</a>
                <p style="margin-top: 10px;">Я отвечаю на все письма в течение 1-2 дней.</p>
            </div>
        </div>
    `;

document.querySelectorAll('[data-map]').forEach(btn => {
    btn.addEventListener('click', () => showMap(btn.getAttribute('data-map')));
});
document.getElementById('settingsBtn').addEventListener('click', showSettings);
document.getElementById('newsBtn').addEventListener('click', showNews);
</script>
</body>
</html>
